name: Push Branch to Other Repo

on:
  push:
    branches:
      - main

jobs:
  push-to-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone target repository
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        run: |
          # Clone the target repository
          git clone https://agurod42:${API_TOKEN_GITHUB}@github.com/agurod42/epic-box.git target-repo
          cd target-repo
          
          # Add source repository as a remote
          git remote add source-repo $GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git
          
          # Fetch the latest changes from source repo
          git fetch source-repo main

          # Merge changes from source repo into target repo
          git merge --no-edit source-repo/main || git merge --abort

          # Push the merged branch to the target repository
          git push origin main